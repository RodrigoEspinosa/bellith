name: Bellith
options:
  minimumXcodeGenVersion: "2.0"
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Bellith:
    type: application
    platform: macOS
    sources:
      - path: Bellith
        excludes:
          - "*.entitlements"
          - "Info.plist"
          - "PrivacyInfo.xcprivacy"
      - path: Bellith/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rec.bellith
        INFOPLIST_FILE: Bellith/Info.plist
        CODE_SIGN_ENTITLEMENTS: Bellith/Bellith.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_DEBUG_DYLIB: NO
        SWIFT_OBJC_BRIDGING_HEADER: ""
        OTHER_LDFLAGS:
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework CoreText"
          - "-framework QuartzCore"
          - "-framework Carbon"
          - "-lstdc++"
          - "-lz"
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - target: bellith-cli
        embed: false
        link: false
    postBuildScripts:
      - script: |
          CLI_SRC="$BUILT_PRODUCTS_DIR/bellith"
          CLI_DST="$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME/Contents/Resources/bellith"
          if [ -f "$CLI_SRC" ]; then
            mkdir -p "$(dirname "$CLI_DST")"
            cp -f "$CLI_SRC" "$CLI_DST"
            chmod +x "$CLI_DST"
          fi
        name: Embed bellith CLI
        basedOnDependencyAnalysis: false
      - script: |
          "$SRCROOT/scripts/stamp-version.sh"
        name: Stamp version from git
        basedOnDependencyAnalysis: false
      - script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "$SRCROOT/.swiftlint.yml" 2>/dev/null || true
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false

  bellith-cli:
    type: tool
    platform: macOS
    sources:
      - path: BellithCLI
    settings:
      base:
        PRODUCT_NAME: bellith
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES

  BellithTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BellithTests
        optional: true
    dependencies:
      - target: Bellith
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Bellith.app/Contents/MacOS/Bellith"
        BUNDLE_LOADER: "$(TEST_HOST)"
