name: Bellith
options:
  minimumXcodeGenVersion: "2.0"
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Bellith:
    type: application
    platform: macOS
    sources:
      - path: Bellith
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rec.bellith
        INFOPLIST_FILE: Bellith/Info.plist
        CODE_SIGN_ENTITLEMENTS: Bellith/Bellith.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_OBJC_BRIDGING_HEADER: ""
        OTHER_LDFLAGS:
          - "-framework Metal"
          - "-framework MetalKit"
          - "-framework CoreText"
          - "-framework QuartzCore"
          - "-framework Carbon"
          - "-lstdc++"
          - "-lz"
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
    postBuildScripts:
      - script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "$SRCROOT/.swiftlint.yml" 2>/dev/null || true
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false

  BellithTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BellithTests
        optional: true
    dependencies:
      - target: Bellith
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Bellith.app/Contents/MacOS/Bellith"
        BUNDLE_LOADER: "$(TEST_HOST)"
